# App registry — maps friendly names to OS-specific launch commands
# Keys are lowercase. Aliases are listed under each entry.
# Commands are resolved dynamically via shutil.which() + OS-specific fallbacks.
# NO hardcoded absolute paths — the system discovers them at runtime.

chrome:
  aliases: [google chrome, browser]
  windows: ["chrome"]
  windows_search: ["chrome", "google-chrome", "chrome.exe"]
  macos: ["open", "-a", "Google Chrome"]
  linux: ["google-chrome"]
  linux_fallbacks: ["google-chrome-stable", "chromium", "chromium-browser"]

firefox:
  aliases: [mozilla firefox]
  windows: ["firefox"]
  windows_search: ["firefox", "firefox.exe"]
  macos: ["open", "-a", "Firefox"]
  linux: ["firefox"]

vscode:
  aliases: [visual studio code, code editor, vs code]
  windows: ["code"]
  windows_search: ["code", "code.cmd"]
  macos: ["open", "-a", "Visual Studio Code"]
  linux: ["code"]

notepad:
  aliases: [text editor, notes]
  windows: ["notepad"]
  windows_search: ["notepad", "notepad.exe"]
  macos: ["open", "-a", "TextEdit"]
  linux: ["gedit", "kate", "mousepad", "xed"]

terminal:
  aliases: [console, command prompt, cmd, shell]
  windows: ["wt"]
  windows_search: ["wt", "wt.exe", "cmd.exe"]
  windows_fallback: ["cmd"]
  macos: ["open", "-a", "Terminal"]
  linux: ["gnome-terminal", "konsole", "xterm", "xfce4-terminal"]

calculator:
